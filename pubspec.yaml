name: x50pay
description: X50Pay app
publish_to: "none"
version: 1.5.4+1

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ^3.44.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.2.3
  collection: ^1.16.0
  country_flags: ^4.1.2
  cupertino_icons: ^1.0.5
  device_info_plus: ^13.1.0
  flutter_native_splash: ^2.2.7
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.0.9
  fluttertoast: ^9.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  html: ^0.15.3
  http: ^1.1.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  local_auth: ^3.0.1
  location: ^8.0.1
  matrix4_transform: ^4.0.1
  mobile_scanner: ^7.2.0
  navigation_history_observer: ^1.1.0
  nfc_manager: ^4.2.1
  package_info_plus: ^10.1.0
  path_drawing: ^1.0.1
  permission_handler: ^12.0.3
  provider: ^6.0.3
  shared_preferences: ^2.2.1
  transparent_image: ^2.0.1
  app_links: ^7.1.1
  url_launcher: ^6.1.14
  vector_graphics: ^1.1.9+1
  vibration: ^3.1.8
  xml: ^6.6.1
  flutter_colorpicker:
    git: "https://github.com/maple135790/flutter_colorpicker.git"
  flutter_easyloading:
    path: "./dependencies/flutter_easyloading-3.0.5/"
  flutter_launcher_icons: ^0.14.4
  nfc_manager_ndef: ^1.1.0
  meta: ^1.18.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  change_app_package_name: ^1.1.0
  flutter_gen_runner: 5.14.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.0
  path: ^1.9.1

flutter:
  uses-material-design: true
  assets:
    - assets/texts/
    - assets/images/appIcon/
    - assets/images/collab/
    - assets/images/common/
    - assets/images/game/
    - assets/images/home/
    - assets/images/home/mari_level/
    - assets/images/scanPay/
    - assets/images/quest/
flutter_icons:
  image_path: assets/images/appIcon/appstore.png
  adaptive_icon_foreground: assets/images/appIcon/playstore.png
  adaptive_icon_background: "#1c1728"
  image_path_ios: assets/images/appIcon/appstore.png
  android: true
  ios: true
  min_sdk_android: 21
  remove_alpha_ios: true
flutter_native_splash:
  color: "#1e1e1e"
  android_12:
    color: "#1e1e1e"
flutter_intl:
  main_locale: "zh_TW"
  enabled: true
flutter_gen:
  line_length: 80
  assets:
    outputs:
      class_name: R
